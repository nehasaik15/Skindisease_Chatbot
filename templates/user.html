<!DOCTYPE html>
<html>
<head>
    <title>Medical AI Assistant - User Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-card {
            width: 95%;
            max-width: 1200px;
            height: 90vh;
            background: #000000;
            border: 1px solid #333333;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(255, 255, 255, 0.1);
        }

        .chat-header {
            background: #111111;
            color: #ffffff;
            padding: 20px 24px;
            font-size: 1.4rem;
            font-weight: 600;
            border-bottom: 1px solid #333333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chat-header i {
            color: #007bff;
            margin-right: 12px;
        }

        .nav-link {
            color: #64ffda;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .nav-link:hover {
            background: rgba(100, 255, 218, 0.1);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #111111;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #333333;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #444444;
        }

        .msg_container {
            max-width: 90%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: #007bff;
            color: white;
            border-radius: 18px 18px 5px 18px;
            padding: 14px 18px;
            margin-left: auto;
            font-size: 1rem;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .bot-msg {
            color: #ffffff;
        }

        .markdown-body {
            background: #111111;
            color: #ffffff;
            font-family: inherit;
            font-size: 1rem;
            line-height: 1.6;
            padding: 18px 22px;
            border-radius: 18px 18px 18px 5px;
            box-shadow: 0 2px 8px rgba(255, 255, 255, 0.05);
            border: 1px solid #222222;
            overflow-wrap: anywhere;
        }

        .markdown-body h1,
        .markdown-body h2,
        .markdown-body h3,
        .markdown-body h4,
        .markdown-body h5,
        .markdown-body h6 {
            color: #ffffff;
            margin: 16px 0 8px 0;
            font-weight: 600;
        }

        .markdown-body h1 {
            font-size: 1.8rem;
            border-bottom: 1px solid #333333;
            padding-bottom: 8px;
        }

        .markdown-body h2 { font-size: 1.5rem; }
        .markdown-body h3 { font-size: 1.3rem; }
        .markdown-body h4 { font-size: 1.1rem; }

        .markdown-body p {
            margin: 10px 0;
            color: #e0e0e0;
        }

        .markdown-body ul,
        .markdown-body ol {
            margin: 10px 0;
            padding-left: 25px;
            color: #e0e0e0;
        }

        .markdown-body li {
            margin: 6px 0;
        }

        .markdown-body li::marker {
            color: #007bff;
        }

        .markdown-body strong {
            color: #ffd700 !important;
            font-weight: 700 !important;
            transition: all 0.2s ease !important;
            cursor: pointer !important;
            padding: 2px 4px !important;
            border-radius: 4px !important;
            display: inline !important;
        }

        .markdown-body strong:hover {
            color: #000000 !important;
            background-color: #ffd700 !important;
        }

        .markdown-body em {
            color: #00ff88 !important;
            font-style: italic !important;
            transition: all 0.2s ease !important;
            cursor: pointer !important;
            padding: 2px 4px !important;
            border-radius: 4px !important;
            display: inline !important;
        }

        .markdown-body em:hover {
            color: #000000 !important;
            background-color: #00ff88 !important;
        }

        .table-wrapper {
            width: 100%;
            overflow-x: auto;
            margin: 16px 0;
            border-radius: 10px;
        }

        .markdown-body table {
            border-collapse: collapse;
            table-layout: fixed;
            width: 100%;
            min-width: 560px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            overflow: hidden;
        }

        .markdown-body th {
            background: #161b22;
            color: #F2F0EF;
            font-weight: 700;
            padding: 12px 16px;
            text-align: left;
            border: 1px solid #30363d;
        }

        .markdown-body td {
            transition: background-color 0.2s ease, color 0.2s ease;
            padding: 10px 14px;
            text-align: left;
            border: 1px solid #30363d;
            color: #F2F0EF;
            background-color: #0d1117;
            vertical-align: top;
        }

        /* Medication column width */
        .markdown-body th:first-child,
        .markdown-body td:first-child {
            width: 260px;
            min-width: 260px;
            max-width: 260px;
            white-space: normal !important;
            word-break: break-word !important;
            overflow-wrap: anywhere !important;
            vertical-align: top;
        }

        /* First column normal state */
        .markdown-body td:first-child {
            color: #ffd700 !important;
            font-weight: 700;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* Whole first-column cell hover = heading-style highlight */
        .markdown-body td:first-child:hover {
            background-color: #ffd700 !important;
            color: #000 !important;
            border-radius: 6px;
        }

        /* Keep bold tags in first column black on hover too */
        .markdown-body td:first-child:hover strong,
        .markdown-body td:first-child:hover b,
        .markdown-body td:first-child:hover span,
        .markdown-body td:first-child:hover p,
        .markdown-body td:first-child:hover div {
            color: #000 !important;
        }

        /* Other columns stay normal */
        .markdown-body td:not(:first-child) {
            color: #f2f0ef !important;
        }

        /* Other columns hover */
        .markdown-body td:not(:first-child):hover {
            background-color: #1f2a38 !important;
            color: #f2f0ef !important;
        }

        .markdown-body td p,
        .markdown-body td ul,
        .markdown-body td ol,
        .markdown-body td li,
        .markdown-body td span,
        .markdown-body td div {
            color: #F2F0EF;
        }

        .markdown-body tr:nth-child(even) td {
            background-color: #161b22;
        }

        .markdown-body tr:hover td {
            background-color: #1f242f;
        }

        .markdown-body td ul {
            padding-left: 18px;
            margin: 4px 0;
        }

        .markdown-body td li::marker {
            color: #64ffda;
        }

        .markdown-body blockquote {
            border-left: 4px solid #007bff;
            padding: 8px 16px;
            background: #1a1a1a;
            margin: 16px 0;
            color: #cccccc;
        }

        .markdown-body pre {
            background: #0d0d0d;
            color: #e0e0e0;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid #333333;
            overflow-x: auto;
            margin: 12px 0;
        }

        .markdown-body code {
            background: #1a1a1a;
            color: #00ff88;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
        }

        .user-image {
            max-width: 220px;
            max-height: 220px;
            border-radius: 12px;
            margin-top: 10px;
            border: 2px solid rgba(255,255,255,0.3);
            cursor: pointer;
        }

        .typing-indicator {
            display: flex;
            padding: 16px 22px;
            background: #111111;
            border-radius: 18px 18px 18px 5px;
            width: fit-content;
            border: 1px solid #222222;
        }

        .typing-indicator span {
            height: 10px;
            width: 10px;
            background: #007bff;
            border-radius: 50%;
            display: inline-block;
            margin: 0 3px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
            30% { transform: translateY(-12px); opacity: 1; }
        }

        .input-group {
            display: flex;
            align-items: center;
            padding: 20px 24px;
            background: #111111;
            border-top: 1px solid #333333;
            gap: 12px;
            flex-wrap: wrap;
        }

        #textInput {
            flex: 1;
            background: #1a1a1a;
            border: 1px solid #333333;
            color: #ffffff;
            padding: 16px 20px;
            border-radius: 40px;
            font-size: 1rem;
            outline: none;
        }

        #textInput:focus {
            border-color: #007bff;
            box-shadow: 0 0 0 2px rgba(0, 123, 255, 0.18);
        }

        .icon-btn {
            background: #1a1a1a;
            border: 1px solid #333333;
            color: #ffffff;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .icon-btn:hover {
            background: #007bff;
            border-color: #007bff;
        }

        .icon-btn.recording {
            background: #ff4444;
            border-color: #ff4444;
            animation: pulse 1s infinite;
        }

        .icon-btn.disabled-audio {
            background: #444444;
            border-color: #444444;
        }

        .status-bar {
            padding: 8px 24px;
            background: #0d0d0d;
            border-top: 1px solid #222222;
            color: #bbbbbb;
            font-size: 0.9rem;
            min-height: 36px;
            display: flex;
            align-items: center;
        }

        .status-bar.error {
            color: #ff8080;
        }

        .status-bar.success {
            color: #7dffb3;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #imageInput {
            display: none;
        }

        .image-preview-container {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 12px;
            margin: 0 24px 10px 24px;
            border: 1px solid #333333;
        }

        .preview-thumbnail {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 2px solid #007bff;
        }

        .remove-image-btn {
            background: none;
            border: none;
            color: #ff4444;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 5px 10px;
            border-radius: 6px;
            transition: background 0.2s ease, color 0.2s ease;
        }

        .remove-image-btn:hover {
            background: #ff4444;
            color: #ffffff;
        }

        .image-modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            overflow: auto;
        }

        .modal-content {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 8px;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            .chat-card {
                width: 100%;
                height: 95vh;
            }

            .msg_container {
                max-width: 95%;
            }

            .icon-btn {
                width: 48px;
                height: 48px;
                font-size: 1.2rem;
            }

            .user-image {
                max-width: 150px;
            }

            .markdown-body {
                padding: 16px 16px;
            }

            .markdown-body table {
                min-width: 480px;
                font-size: 0.85rem;
            }

            .markdown-body th,
            .markdown-body td {
                word-break: normal;        /* Don't break words */
                overflow-wrap: break-word; /* Break only if absolutely needed */
                /* white-space: normal; */
                padding: 8px 10px;
            }
            
            .top-result {
                float: left;
                width: 100px;
                height: 100px;
                object-fit: cover;
            }
        }
    </style>
</head>
<body>
    <div class="chat-card">
        <div class="chat-header">
            <div>
                <i class="fas fa-hand-holding-medical"></i> MEDICAL AI ASSISTANT
            </div>
            <!-- <a href="/admin" class="admin-link">Admin Dashboard</a> -->
        </div>
        
        <div id="messageContainer" class="chat-messages">
            <div class="msg_container bot-msg">
                <div class="markdown-body">
                    <strong>👋 Welcome to Medical AI Assistant!</strong>
                </div>
            </div>
        </div>

        <div id="imagePreviewArea" class="image-preview-container" style="display: none;">
            <img id="previewImage" class="preview-thumbnail" src="#" alt="Preview">
            <div id="previewFileName" style="flex: 1; color: #ccc;"></div>
            <button id="removeImageBtn" class="remove-image-btn"><i class="fas fa-times"></i></button>
        </div>

        <div class="input-group">
            <label for="imageInput" class="icon-btn" title="Upload image">
                <i class="fas fa-camera"></i>
            </label>
            <input type="file" id="imageInput" accept="image/*">

            <button id="voiceBtn" class="icon-btn" title="Voice input">
                <i class="fas fa-microphone"></i>
            </button>

            <button id="muteBtn" class="icon-btn" title="Mute / unmute audio">
                <i id="muteIcon" class="fas fa-volume-up"></i>
            </button>

            <input type="text" id="textInput" placeholder="Ask a question (e.g., 'What are symptoms of chickenpox?')" autocomplete="off">
            
            <button id="sendBtn" class="icon-btn" title="Send message">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>

        <div id="statusBar" class="status-bar">Ready.</div>
    </div>

    <script>
        let currentImageFile = null;
        let currentImageDataUrl = null;
        let isRecording = false;
        let recognition = null;
        let isMuted = false;
        let currentAudio = null;

        const messageContainer = document.getElementById('messageContainer');
        const statusBar = document.getElementById('statusBar');
        const voiceBtn = document.getElementById('voiceBtn');
        const muteBtn = document.getElementById('muteBtn');
        const muteIcon = document.getElementById('muteIcon');
        const textInput = document.getElementById('textInput');

        function setStatus(message, type = '') {
            statusBar.textContent = message;
            statusBar.className = 'status-bar';
            if (type) statusBar.classList.add(type);
            console.log('[STATUS]', message);
        }

        fetch('/clear_history', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: 'static_user' })
        }).then(() => {
            setStatus('', 'success');
        }).catch(e => {
            console.log('Clear history error:', e);
            setStatus('Ready. Could not clear old history.', 'error');
        });

        marked.setOptions({
            breaks: true,
            gfm: true,
            tables: true,
            headerIds: false,
            mangle: false
        });

        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
                voiceBtn.disabled = true;
                voiceBtn.classList.add('disabled-audio');
                setStatus('Speech recognition not supported. Use Chrome or Edge.', 'error');
                return;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-US';
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                isRecording = true;
                voiceBtn.classList.add('recording');
                voiceBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
                setStatus('Listening... Speak now.', 'success');
                console.log('STT started');
            };

            recognition.onresult = function(event) {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                textInput.value = transcript.trim();
                console.log('STT transcript:', transcript);
                setStatus('Voice captured. Review or send.', 'success');
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);

                let msg = 'Speech recognition failed.';
                if (event.error === 'not-allowed') {
                    msg = 'Microphone permission denied. Allow mic access in the browser.';
                } else if (event.error === 'no-speech') {
                    msg = 'No speech detected. Try again and speak clearly.';
                } else if (event.error === 'audio-capture') {
                    msg = 'No microphone detected or microphone unavailable.';
                } else if (event.error === 'network') {
                    msg = 'Speech recognition network error.';
                }

                setStatus(msg, 'error');
            };

            recognition.onend = function() {
                isRecording = false;
                voiceBtn.classList.remove('recording');
                voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>';
                console.log('STT ended');
            };
        }

        function scrollToBottom() {
            messageContainer.scrollTop = messageContainer.scrollHeight;
        }

        function showFullImage(src) {
            const modal = document.createElement('div');
            modal.className = 'image-modal';
            modal.innerHTML = `
                <span class="close-modal">&times;</span>
                <img class="modal-content" src="${src}">
            `;
            document.body.appendChild(modal);
            modal.style.display = 'block';

            modal.querySelector('.close-modal').onclick = () => {
                modal.remove();
            };
            modal.onclick = (e) => {
                if (e.target === modal) modal.remove();
            };
        }

        function wrapTables(tempDiv) {
            const tables = tempDiv.querySelectorAll('table');
            tables.forEach(table => {
                if (!table.parentElement.classList.contains('table-wrapper')) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'table-wrapper';
                    table.parentNode.insertBefore(wrapper, table);
                    wrapper.appendChild(table);
                }
            });
        }

        function showTypingIndicator() {
            const typingHtml = `
                <div class="msg_container bot-msg" id="typingIndicator">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messageContainer.insertAdjacentHTML('beforeend', typingHtml);
            scrollToBottom();
            setStatus('Waiting for response...');
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function displayUserMessage(text, imageDataUrl) {
            let messageHtml = '<div class="msg_container user-msg">';
            
            if (text) {
                messageHtml += `<div>${escapeHtml(text)}</div>`;
            }
            
            if (imageDataUrl) {
                messageHtml += `<img src="${imageDataUrl}" class="user-image" onclick="showFullImage('${imageDataUrl}')">`;
            }
            
            messageHtml += '</div>';
            messageContainer.insertAdjacentHTML('beforeend', messageHtml);
            scrollToBottom();
        }

        function displayBotMessage(response) {
            const parsedHtml = marked.parse(response || "No response received");

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = parsedHtml;
            wrapTables(tempDiv);

            const botHtml = `
                <div class="msg_container bot-msg">
                    <div class="markdown-body">
                        ${tempDiv.innerHTML}
                    </div>
                </div>
            `;

            messageContainer.insertAdjacentHTML('beforeend', botHtml);
            scrollToBottom();
        }

        function playAudio(audioUrl) {
            if (!audioUrl) {
                setStatus('No audio returned from backend.');
                return;
            }

            if (isMuted) {
                console.log('Audio skipped because muted');
                setStatus('Response received. Audio is muted.');
                return;
            }

            try {
                if (currentAudio) {
                    currentAudio.pause();
                    currentAudio = null;
                }

                currentAudio = new Audio(audioUrl);
                currentAudio.preload = 'auto';

                currentAudio.onplay = () => {
                    console.log('Audio playing');
                    setStatus('Playing response audio...', 'success');
                };

                currentAudio.onended = () => {
                    console.log('Audio ended');
                    setStatus('Response complete.', 'success');
                };

                currentAudio.onerror = (e) => {
                    console.error('Audio playback error:', e);
                    setStatus('Audio could not be played.', 'error');
                };

                currentAudio.play()
                    .then(() => {
                        console.log('Audio play started');
                    })
                    .catch(err => {
                        console.error('Audio playback blocked:', err);
                        setStatus('Audio playback blocked by browser.', 'error');
                    });

            } catch (err) {
                console.error('Audio setup failed:', err);
                setStatus('Audio setup failed.', 'error');
            }
        }

        function sendMessage() {
            const msg = textInput.value.trim();

            if (!msg && !currentImageFile) {
                displayBotMessage("Please type a question or upload a skin photo for diagnosis.");
                setStatus('Please type a question or upload an image.', 'error');
                return;
            }

            displayUserMessage(msg, currentImageDataUrl);

            textInput.value = '';
            const tempImageFile = currentImageFile;
            clearImageSelection();

            showTypingIndicator();

            const formData = new FormData();
            if (msg) formData.append("msg", msg);
            if (tempImageFile) formData.append("image", tempImageFile);

            fetch('/get', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                removeTypingIndicator();
                console.log('Backend response:', data);

                if (data.answer) {
                    displayBotMessage(data.answer);
                    setStatus('Response received.', 'success');
                } else {
                    displayBotMessage("I couldn't process that. Please try again.");
                    setStatus('Backend returned no answer.', 'error');
                }

                if (data.audio_url) {
                    console.log('Audio URL:', data.audio_url);
                    playAudio(data.audio_url);
                } else {
                    console.log('No audio_url in response');
                }
            })
            .catch(error => {
                removeTypingIndicator();
                console.error('Error:', error);
                displayBotMessage("Sorry, I encountered an error. Please try again.");
                setStatus(`Request failed: ${error.message}`, 'error');
            });
        }

        function startVoiceInput() {
            if (!recognition) {
                setStatus("Speech recognition not supported. Please use Chrome or Edge.", 'error');
                return;
            }

            try {
                if (isRecording) {
                    recognition.stop();
                    setStatus('Stopped listening.');
                } else {
                    recognition.start();
                }
            } catch (err) {
                console.error('Speech recognition start failed:', err);
                setStatus('Could not start microphone.', 'error');
            }
        }

        function toggleMute() {
            isMuted = !isMuted;

            muteIcon.className = isMuted ? 'fas fa-volume-mute' : 'fas fa-volume-up';
            muteBtn.classList.toggle('disabled-audio', isMuted);

            fetch('/mute', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ isActive: isMuted })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Mute response:', data);
            })
            .catch(err => {
                console.error('Mute update failed:', err);
            });

            if (isMuted) {
                if (currentAudio) currentAudio.pause();
                setStatus('Audio muted.');
            } else {
                setStatus('Audio unmuted.', 'success');
            }
        }

        function handleImageSelection(file) {
            currentImageFile = file;
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImageDataUrl = e.target.result;
                document.getElementById('previewImage').src = currentImageDataUrl;
                document.getElementById('previewFileName').textContent = file.name;
                document.getElementById('imagePreviewArea').style.display = 'flex';
                setStatus(`Image selected: ${file.name}`, 'success');
            };
            reader.readAsDataURL(file);
        }

        function clearImageSelection() {
            currentImageFile = null;
            currentImageDataUrl = null;
            document.getElementById('imageInput').value = '';
            document.getElementById('imagePreviewArea').style.display = 'none';
            document.getElementById('previewImage').src = '#';
            document.getElementById('previewFileName').textContent = '';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('voiceBtn').addEventListener('click', startVoiceInput);
        document.getElementById('muteBtn').addEventListener('click', toggleMute);
        document.getElementById('textInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        document.getElementById('imageInput').addEventListener('change', (e) => {
            if (e.target.files[0]) handleImageSelection(e.target.files[0]);
        });
        document.getElementById('removeImageBtn').addEventListener('click', clearImageSelection);

        window.showFullImage = showFullImage;
        initSpeechRecognition();
        scrollToBottom();
    </script>
</body>
</html>
